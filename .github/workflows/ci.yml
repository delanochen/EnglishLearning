name: Verify HomeLingua

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: homelingua
          POSTGRES_PASSWORD: homelingua-test-password
          POSTGRES_DB: homelingua_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U homelingua -d homelingua_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://homelingua:homelingua-test-password@127.0.0.1:5432/homelingua_test
      AUTH_SECRET: github-actions-only-secret-at-least-32-characters
      INITIAL_ADMIN_EMAIL: e2e-admin@example.test
      INITIAL_ADMIN_PASSWORD: E2E-only-password-2026!
      INITIAL_ADMIN_NAME: E2E Administrator
      E2E_ADMIN_EMAIL: e2e-admin@example.test
      E2E_ADMIN_PASSWORD: E2E-only-password-2026!

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma generate
      - run: pnpm prisma migrate deploy
      - run: pnpm exec tsx prisma/seed.ts
      - run: pnpm exec tsx scripts/init-admin.ts
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
