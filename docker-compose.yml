name: homelingua
services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-homelingua}
      POSTGRES_USER: ${POSTGRES_USER:-homelingua}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets: [postgres_password]
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    logging: &logging
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    networks: [internal]

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    logging: *logging
    networks: [internal]

  app:
    build: .
    image: homelingua-app
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-homelingua}
      POSTGRES_USER: ${POSTGRES_USER:-homelingua}
      INITIAL_ADMIN_NAME: ${INITIAL_ADMIN_NAME:-System Administrator}
      AUTH_TRUST_HOST: "true"
      UPLOAD_DIR: /app/uploads
      LOG_DIR: /app/logs
      REDIS_HOST: redis
      REDIS_PORT: 6379
    secrets: [postgres_password, auth_secret, settings_encryption_key, initial_admin_email, initial_admin_password]
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
      - ./backups:/backups
    ports:
      - "${APP_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health/ready"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 60s
    logging: *logging
    networks: [internal]

  content-worker:
    image: homelingua-app
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-homelingua}
      POSTGRES_USER: ${POSTGRES_USER:-homelingua}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CONTENT_WORKER_CONCURRENCY: ${CONTENT_WORKER_CONCURRENCY:-2}
      CONTENT_WORKER_RATE_MAX: ${CONTENT_WORKER_RATE_MAX:-20}
      CONTENT_WORKER_RATE_DURATION_MS: ${CONTENT_WORKER_RATE_DURATION_MS:-60000}
      CONTENT_WORKER_LOCK_MS: ${CONTENT_WORKER_LOCK_MS:-120000}
      LOG_DIR: /app/logs
    secrets: [postgres_password, settings_encryption_key]
    volumes:
      - ./logs:/app/logs
      - ./content-cache:/app/content-cache
      - ./import-cache:/app/import-cache
    entrypoint: ["/app/scripts/content-worker-entrypoint.sh"]
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    stop_grace_period: 3m
    logging: *logging
    networks: [internal]

  reports:
    image: homelingua-app
    profiles: [operations]
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-homelingua}
      POSTGRES_USER: ${POSTGRES_USER:-homelingua}
    secrets: [postgres_password]
    entrypoint: ["/app/scripts/run-reports.sh"]
    networks: [internal]

  adminer:
    image: adminer:5
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
    ports:
      - "127.0.0.1:${ADMINER_PORT:-8080}:8080"
    logging: *logging
    networks: [internal]
    profiles: [tools]

  backup:
    image: postgres:17-alpine
    profiles: [operations]
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: ${POSTGRES_DB:-homelingua}
      PGUSER: ${POSTGRES_USER:-homelingua}
      APP_VERSION: ${APP_VERSION:-0.8.0}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
    secrets: [postgres_password]
    volumes:
      - ./uploads:/source/uploads:ro
      - ./backups:/backups
      - type: bind
        source: ./backups/restore-staging
        target: /restore
        bind:
          create_host_path: true
      - ./scripts:/scripts:ro
    entrypoint: ["/bin/sh", "/scripts/backup.sh"]
    networks: [internal]

secrets:
  postgres_password: { file: ./secrets/postgres_password }
  auth_secret: { file: ./secrets/auth_secret }
  settings_encryption_key: { file: ./secrets/settings_encryption_key }
  initial_admin_email: { file: ./secrets/initial_admin_email }
  initial_admin_password: { file: ./secrets/initial_admin_password }

networks:
  internal: { driver: bridge }
